{% extends 'base.html' %}

{% block content %}
<style>
    .login-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 70vh;
    }

    .login-card {
        background: #ffffff;
        border: 1px solid #e8e8e8;
        border-radius: 16px;
        padding: 2.5rem 2rem;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }

    .login-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .login-logo {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        font-size: 1.3rem;
        font-weight: 700;
        color: #0a8a8a;
        margin-bottom: 0.5rem;
        letter-spacing: -0.3px;
    }

    .login-logo svg { width: 28px; height: 28px; }

    .login-header p {
        color: #999;
        font-size: 0.875rem;
        font-weight: 400;
    }

    .form-group { margin-bottom: 1.25rem; }

    .form-group label {
        display: block;
        font-size: 0.82rem;
        font-weight: 600;
        color: #444;
        margin-bottom: 0.4rem;
        letter-spacing: 0.2px;
        text-transform: uppercase;
    }

    .form-group input {
        width: 100%;
        padding: 0.65rem 0.9rem;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 0.9rem;
        font-family: 'Inter', sans-serif;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
        background: #fafafa;
        color: #2d2d2d;
    }

    .form-group input:focus {
        border-color: #0a8a8a;
        box-shadow: 0 0 0 3px rgba(10,138,138,0.1);
        background: #ffffff;
    }

    .btn-submit {
        width: 100%;
        padding: 0.75rem;
        background: #0a8a8a;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 0.9rem;
        font-weight: 600;
        font-family: 'Inter', sans-serif;
        cursor: pointer;
        transition: background 0.2s;
        margin-top: 0.5rem;
        letter-spacing: 0.2px;
    }

    .btn-submit:hover { background: #077070; }

    .error-msg {
        background: #fff5f5;
        border: 1px solid #fcd0d0;
        color: #c0392b;
        padding: 0.65rem 0.9rem;
        border-radius: 8px;
        font-size: 0.85rem;
        margin-bottom: 1.25rem;
        font-weight: 500;
    }
</style>

<div class="login-wrapper">
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">
                <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="28" height="28" rx="7" fill="#0a8a8a"/>
                    <path d="M7 9h4v6a3.5 3.5 0 0 0 7 0v-1a1.5 1.5 0 0 1 3 0v2.5A5.5 5.5 0 0 1 15.5 22" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                    <path d="M9 6.5v2.5M11 6.5v2.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
                MediTrack
            </div>
            <p>Sign in to your account to continue</p>
        </div>

        {% if form.errors %}
            <div class="error-msg">Invalid username or password. Please try again.</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-submit">Sign In</button>
        </form>
    </div>
</div>
{% endblock %}
