<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediTrack - Hospital Inventory Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            color: #2d2d2d;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            background: #ffffff;
            border-bottom: 1px solid #e0e0e0;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.2rem;
            font-weight: 700;
            color: #0a8a8a;
            text-decoration: none;
            letter-spacing: -0.3px;
        }

        .nav-brand svg {
            width: 28px;
            height: 28px;
        }

        .nav-links { display: flex; align-items: center; gap: 0.75rem; }

        .nav-links a {
            text-decoration: none;
            color: #555;
            font-size: 0.875rem;
            font-weight: 500;
            padding: 0.4rem 1rem;
            border-radius: 6px;
            transition: background 0.2s, color 0.2s;
        }

        .nav-links a:hover { background: #f0f8f8; color: #0a8a8a; }

        .nav-user {
            font-size: 0.875rem;
            font-weight: 500;
            color: #555;
            padding: 0.4rem 0.75rem;
            background: #f5f5f5;
            border-radius: 6px;
        }

        .btn-login {
            background: #0a8a8a !important;
            color: white !important;
            font-weight: 600 !important;
        }

        .btn-login:hover { background: #077070 !important; }

        .btn-logout {
            background: #f5f5f5 !important;
            color: #555 !important;
            border: 1px solid #ddd;
        }

        main {
            flex: 1;
            padding: 2.5rem 2rem;
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
        }

        footer {
            background: #f5f5f5;
            border-top: 1px solid #e0e0e0;
            text-align: center;
            padding: 1rem;
            font-size: 0.8rem;
            color: #999;
            letter-spacing: 0.2px;
        }
    </style>
</head>
<body>

<nav>
    <a href="/" class="nav-brand">
        <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="28" height="28" rx="7" fill="#0a8a8a"/>
            <path d="M7 9h4v6a3.5 3.5 0 0 0 7 0v-1a1.5 1.5 0 0 1 3 0v2.5A5.5 5.5 0 0 1 15.5 22" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <path d="M9 6.5v2.5M11 6.5v2.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        MediTrack
    </a>
    <div class="nav-links">
        {% if user.is_authenticated %}
            <span class="nav-user">{{ user.username }}</span>
            <a href="/logout/" class="btn-logout">Sign Out</a>
        {% else %}
            <a href="/login/" class="btn-login">Sign In</a>
        {% endif %}
    </div>
</nav>

<main>
    {% block content %}{% endblock %}
</main>

<footer>
    &copy; 2025 MediTrack &mdash; Hospital Inventory Management System &nbsp;&nbsp;|&nbsp;&nbsp; All rights reserved.
</footer>

</body>
</html>
