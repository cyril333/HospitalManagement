{% extends 'base.html' %}
{% block title %}Edit Profile | MediTrack{% endblock %}

{% block content %}
<div class="form-card">
    <div class="form-title">Edit Profile</div>
    <div class="form-subtitle">Update your personal information and password.</div>

    <form method="POST">
        {% csrf_token %}
        <div class="form-grid">
            <div class="form-group">
                <label>Username</label>
                <input type="text" value="{{ user.username }}" disabled>
                <span class="help-text">Username is fixed and must remain unique.</span>
            </div>

            <div class="form-group">
                <label for="first_name">First Name</label>
                <input type="text" id="first_name" name="first_name" value="{{ user.first_name }}">
            </div>

            <div class="form-group">
                <label for="last_name">Last Name</label>
                <input type="text" id="last_name" name="last_name" value="{{ user.last_name }}">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="{{ user.email }}">
            </div>

            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" name="password" placeholder="Leave blank to keep current password">
                <span class="help-text">Only enter a password if you want to change it.</span>
            </div>
        </div>

        <div style="display:flex; gap:0.75rem; margin-top:1.5rem; flex-wrap:wrap;">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{% url 'index' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
