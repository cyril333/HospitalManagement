{% extends 'base.html' %}
{% block content %}
<style>
    .form-card {
        background: white;
        border: 1px solid #e8e8e8;
        border-radius: 12px;
        padding: 2rem;
        max-width: 560px;
    }
    .form-card h2 {
        font-size: 1.3rem;
        font-weight: 700;
        color: #1a1a1a;
        margin-bottom: 1.5rem;
    }
    .form-group {
        margin-bottom: 1.2rem;
    }
    .form-group label {
        display: block;
        font-size: 0.85rem;
        font-weight: 600;
        color: #555;
        margin-bottom: 0.4rem;
    }
    .form-group input,
    .form-group select {
        width: 100%;
        padding: 0.55rem 0.85rem;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 0.9rem;
        font-family: 'Inter', sans-serif;
        outline: none;
        transition: border 0.2s;
    }
    .form-group input:focus,
    .form-group select:focus {
        border-color: #0a8a8a;
    }
    .form-actions {
        display: flex;
        gap: 0.75rem;
        margin-top: 1.5rem;
    }
    .btn {
        padding: 0.6rem 1.4rem;
        border-radius: 8px;
        font-size: 0.875rem;
        font-weight: 600;
        font-family: 'Inter', sans-serif;
        cursor: pointer;
        text-decoration: none;
        border: none;
        transition: background 0.2s;
    }
    .btn-primary { background: #0a8a8a; color: white; }
    .btn-primary:hover { background: #077070; }
    .btn-secondary { background: #f0f0f0; color: #555; }
    .btn-secondary:hover { background: #e0e0e0; }
    .errorlist {
        color: #c0392b;
        font-size: 0.8rem;
        margin-top: 0.3rem;
        padding-left: 1rem;
    }
</style>

<div class="form-card">
    <h2>{{ title }}</h2>
    <form method="POST">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
            <ul class="errorlist">
                {% for error in field.errors %}
                <li>{{ error }}</li>
                {% endfor %}
            </ul>
            {% endif %}
        </div>
        {% endfor %}
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{% url back_url %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
