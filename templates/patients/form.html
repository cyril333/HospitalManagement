{% extends 'base.html' %}
{% block title %}{{ title }} | MediTrack{% endblock %}

{% block content %}
<style>
    .form-card { background: white; border: 1px solid #e8e8e8; border-radius: 12px; padding: 2rem; max-width: 600px; }
    .form-title { font-size: 1.3rem; font-weight: 700; color: #1a1a1a; margin-bottom: 1.5rem; letter-spacing: -0.3px; }
    .form-group { margin-bottom: 1.25rem; }
    .form-group label { display: block; font-size: 0.82rem; font-weight: 600; color: #444; margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.2px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.65rem 0.9rem; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; font-family: 'Inter', sans-serif; outline: none; background: #fafafa; transition: border-color 0.2s, box-shadow 0.2s; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #0a8a8a; box-shadow: 0 0 0 3px rgba(10,138,138,0.1); background: white; }
    .form-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
    .btn { padding: 0.6rem 1.4rem; border-radius: 8px; font-size: 0.875rem; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; text-decoration: none; border: none; transition: background 0.2s; }
    .btn-primary { background: #0a8a8a; color: white; }
    .btn-primary:hover { background: #077070; }
    .btn-secondary { background: #f0f0f0; color: #555; }
    .btn-secondary:hover { background: #e0e0e0; }
    .field-error { margin-top: 0.35rem; color: #c0392b; font-size: 0.82rem; font-weight: 600; }
</style>

<div class="form-card">
    <div class="form-title">{{ title }}</div>
    <form method="POST">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}

            {% for error in field.errors %}
                <div class="field-error">{{ error }}</div>
            {% endfor %}
        </div>
        {% endfor %}
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{% url back_url %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const dobField = document.getElementById('id_dateofbirth');
    const ageField = document.getElementById('id_age');

    function calculateAge(dateString) {
        if (!dateString) {
            return '';
        }

        const today = new Date();
        const birthDate = new Date(dateString);

        let age = today.getFullYear() - birthDate.getFullYear();
        const monthDiff = today.getMonth() - birthDate.getMonth();

        if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
            age--;
        }

        return age >= 0 ? age : '';
    }

    function updateAge() {
        if (dobField && ageField) {
            ageField.value = calculateAge(dobField.value);
        }
    }

    if (dobField && ageField) {
        ageField.setAttribute('readonly', 'readonly');
        dobField.addEventListener('change', updateAge);
        updateAge();
    }
});
</script>
{% endblock %}
