{% extends 'base.html' %}
{% block content %}
<style>
    .logout-card {
        background: white;
        border: 1px solid #e8e8e8;
        border-radius: 12px;
        padding: 2rem;
        max-width: 420px;
    }
    .logout-card h2 { font-size: 1.2rem; font-weight: 700; color: #1a1a1a; margin-bottom: 0.75rem; }
    .logout-card p { font-size: 0.9rem; color: #666; margin-bottom: 1.5rem; }
    .form-actions { display: flex; gap: 0.75rem; }
    .btn {
        padding: 0.6rem 1.4rem;
        border-radius: 8px;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        border: none;
        transition: background 0.2s;
        font-family: inherit;
    }
    .btn-danger { background: #c0392b; color: white; }
    .btn-danger:hover { background: #a93226; }
    .btn-secondary { background: #f0f0f0; color: #555; }
    .btn-secondary:hover { background: #e0e0e0; }
</style>

<div class="logout-card">
    <h2>Log Off</h2>
    <p>Are you sure you want to sign out of your account?</p>
    <form method="POST">
        {% csrf_token %}
        <div class="form-actions">
            <button type="submit" class="btn btn-danger">Yes, Log Off</button>
            <a href="{% url 'home' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
