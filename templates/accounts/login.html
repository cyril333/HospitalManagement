{% extends 'base.html' %}
{% block content %}
<style>
    .login-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
    }
    .login-card {
        background: white;
        border: 1px solid #e8e8e8;
        border-radius: 16px;
        padding: 2.5rem 2rem;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .login-card h2 {
        font-size: 1.5rem;
        font-weight: 700;
        color: #1a1a1a;
        margin-bottom: 0.4rem;
    }
    .login-card p.subtitle {
        font-size: 0.875rem;
        color: #888;
        margin-bottom: 1.8rem;
    }
    .form-group {
        margin-bottom: 1.1rem;
    }
    .form-group label {
        display: block;
        font-size: 0.82rem;
        font-weight: 600;
        color: #555;
        margin-bottom: 0.4rem;
    }
    .form-group input {
        width: 100%;
        padding: 0.6rem 0.9rem;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 0.9rem;
        outline: none;
        transition: border 0.2s;
        box-sizing: border-box;
    }
    .form-group input:focus {
        border-color: #0a8a8a;
    }
    .error-msg {
        background: #fef0f0;
        border: 1px solid #fcd0d0;
        color: #c0392b;
        font-size: 0.85rem;
        padding: 0.6rem 0.9rem;
        border-radius: 8px;
        margin-bottom: 1rem;
    }
    .btn-login {
        width: 100%;
        padding: 0.7rem;
        background: #0a8a8a;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
        margin-top: 0.5rem;
    }
    .btn-login:hover { background: #077070; }
</style>

<div class="login-wrapper">
    <div class="login-card">
        <h2>Hospital Management</h2>
        <p class="subtitle">Sign in to your account to continue.</p>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn-login">Sign In</button>
        </form>
    </div>
</div>
{% endblock %}
