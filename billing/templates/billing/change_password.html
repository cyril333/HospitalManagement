{% extends 'base.html' %}
{% block content %}
<style>
    .password-card { background: white; border: 1px solid #e8e8e8; border-radius: 12px; padding: 2rem; max-width: 500px; margin-top: 1rem; }
    .password-card h2 { font-size: 1.3rem; font-weight: 700; color: #1a1a1a; margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.82rem; font-weight: 600; color: #444; margin-bottom: 0.3rem; text-transform: uppercase; }
    .form-group input { width: 100%; padding: 0.6rem; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; font-family: 'Inter', sans-serif; }
    .btn { padding: 0.6rem 1.4rem; border-radius: 8px; font-weight: 600; border: none; cursor: pointer; text-decoration: none; display: inline-block; }
    .btn-primary { background: #0a8a8a; color: white; }
    .btn-primary:hover { background: #077070; }
    .btn-secondary { background: #f0f0f0; color: #555; margin-left: 0.5rem; }
    .errorlist { color: #c0392b; font-size: 0.85rem; list-style: none; padding: 0; }
</style>

<div class="password-card">
    <h2>Change Password</h2>

    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div class="form-group">
                <label>{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="errorlist">{{ field.errors }}</div>
                {% endif %}
            </div>
        {% endfor %}
        <div style="margin-top: 1.5rem;">
            <button type="submit" class="btn btn-primary">Change Password</button>
            <a href="{% url 'edit_profile' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
