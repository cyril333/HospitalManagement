{% extends 'admin/base_site.html' %}

{% block content %}
<div style="max-width: 600px; margin: 20px auto;">
    <h2>Create Bill</h2>

    <form method="post">
        {% csrf_token %}

        <!-- Patient Field -->
        <div style="margin-bottom: 20px;">
            <label for="patient" style="display: inline-block; width: 120px; vertical-align: top;">Patient:</label>
            <div style="display: inline-block;">
                <select name="patient" id="patient" style="width: 250px; padding: 5px;">
                    <option value="">---------</option>
                    {% for patient in patients %}
                        <option value="{{ patient.id }}">{{ patient.name }}</option>
                    {% endfor %}
                </select>
                <div style="font-size: 12px; color: #666; margin-top: 4px;">
                    Select the patient this bill belongs to.
                </div>
            </div>
        </div>

        <!-- Admission Field (Optional) -->
        <div style="margin-bottom: 20px;">
            <label for="admission" style="display: inline-block; width: 120px; vertical-align: top;">Admission:</label>
            <div style="display: inline-block;">
                <select name="admission" id="admission" style="width: 250px; padding: 5px;">
                    <option value="">---------</option>
                    {% for admission in admissions %}
                        <option value="{{ admission.id }}">{{ admission }}</option>
                    {% endfor %}
                </select>
                <div style="font-size: 12px; color: #666; margin-top: 4px;">
                    (Optional - for inpatient stay)
                </div>
            </div>
        </div>

        <!-- Consultation Field (Optional) -->
        <div style="margin-bottom: 20px;">
            <label for="consultation" style="display: inline-block; width: 120px; vertical-align: top;">Consultation:</label>
            <div style="display: inline-block;">
                <select name="consultation" id="consultation" style="width: 250px; padding: 5px;">
                    <option value="">---------</option>
                    {% for consultation in consultations %}
                        <option value="{{ consultation.id }}">{{ consultation }}</option>
                    {% endfor %}
                </select>
                <div style="font-size: 12px; color: #666; margin-top: 4px;">
                    (Optional)
                </div>
            </div>
        </div>

        <!-- Prescription Field (Optional) -->
        <div style="margin-bottom: 20px;">
            <label for="prescription" style="display: inline-block; width: 120px; vertical-align: top;">Prescription:</label>
            <div style="display: inline-block;">
                <select name="prescription" id="prescription" style="width: 250px; padding: 5px;">
                    <option value="">---------</option>
                    {% for prescription in prescriptions %}
                        <option value="{{ prescription.id }}">{{ prescription }}</option>
                    {% endfor %}
                </select>
                <div style="font-size: 12px; color: #666; margin-top: 4px;">
                    (Optional)
                </div>
            </div>
        </div>

        <!-- Subtotal Field -->
        <div style="margin-bottom: 20px;">
            <label for="subtotal" style="display: inline-block; width: 120px;">Subtotal:</label>
            <input type="number" name="subtotal" id="subtotal" step="0.01" style="width: 240px; padding: 5px;">
        </div>

        <!-- Discount Field -->
        <div style="margin-bottom: 20px;">
            <label for="discount" style="display: inline-block; width: 120px;">Discount:</label>
            <div style="display: inline-block;">
                <input type="number" name="discount" id="discount" step="0.01" value="0" style="width: 240px; padding: 5px;">
                <div style="font-size: 12px; color: #666; margin-top: 4px;">
                    (Default: 0)
                </div>
            </div>
        </div>

        <!-- Payment Status Field -->
        <div style="margin-bottom: 20px;">
            <label style="display: inline-block; width: 120px; vertical-align: top;">Payment Status:</label>
            <div style="display: inline-block;">
                <label style="margin-right: 15px;">
                    <input type="radio" name="payment_status" value="Unpaid" checked> Unpaid
                </label>
                <label style="margin-right: 15px;">
                    <input type="radio" name="payment_status" value="Paid"> Paid
                </label>
                <label>
                    <input type="radio" name="payment_status" value="Partially Paid"> Partially Paid
                </label>
            </div>
        </div>

        <!-- Bill Date Field -->
        <div style="margin-bottom: 30px;">
            <label for="bill_date" style="display: inline-block; width: 120px;">Bill Date:</label>
            <div style="display: inline-block;">
                <input type="text" name="bill_date" id="bill_date" placeholder="mm/dd/yyyy" style="width: 240px; padding: 5px;">
                <div style="font-size: 12px; color: #666; margin-top: 4px;">
                    (mm/dd/yyyy)
                </div>
            </div>
        </div>

        <!-- Buttons -->
        <div style="margin-left: 120px;">
            <button type="submit" style="padding: 8px 20px; margin-right: 10px;">Save Bill</button>
            <a href="{% url 'billing_list' %}" style="padding: 8px 20px; text-decoration: none; background: #f0f0f0; border: 1px solid #ccc; color: #333;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
